<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>共享数据平台</title>
<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}
h1, h3 { color: #333; }
textarea { width: 100%; height: 250px; font-family: monospace; padding: 10px; box-sizing: border-box; margin-top: 10px; }
input, select, button { margin-top: 10px; padding: 5px; }
section { margin-bottom: 40px; }
.dark{
    background:#111;
    color:white;
}
.dark textarea{
    background:#222;
    color:white;
}
.dark input{
    background:#222;
    color:white;
}
.header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="header">
<h1>共享数据平台</h1>
<p>多人协作维护</p>
</div>

<section>
<h3>合并内容</h3>

<button onclick="copyContent()">📋 复制内容</button>
<button onclick="toggleDarkMode()">🌙 深色模式</button>
<br>
<input type="text" id="searchBox" placeholder="搜索内容..." onkeyup="searchContent()">

<textarea id="output" readonly></textarea>

<div id="status">状态：加载中...</div>
<p>最后更新时间：<span id="lastUpdate">加载中...</span></p>
</section>

<section>
<h3>上传节点文件</h3>
<p>在下面输入节点内容（Base64 或普通文本均可），选择用户生成本地文件：</p>
<textarea id="nodeContent" placeholder="在这里输入节点内容"></textarea>
<br>

<label>选择用户：
<select id="userSelect">
    <option value="a.txt">用户 A</option>
    <option value="b.txt">用户 B</option>
    <option value="c.txt">用户 C</option>
</select>
</label>
<br>

<button id="uploadBtn">生成节点文件</button>
<p>提示：生成文件后，请手动上传到仓库 <code>data/</code> 文件夹，然后刷新页面查看更新后的内容。</p>
</section>

<hr>
<section>
<h3>管理员</h3>
<a href="upload.html">进入上传页面（可选）</a>
</section>

<script>
// 自动读取并合并内容
async function loadData() {
    const files = ["data/a.txt", "data/b.txt", "data/c.txt"];
    let result = "";
    let success = false;

    for (const file of files) {
        try {
            const text = await fetch(file + "?t=" + Date.now()).then(r => r.text());
            if (text.trim() !== "") {
                result += text + "\n";
            }
            success = true;
        } catch (e) {
            console.log("读取失败:", file, e);
            success = false;
        }
    }

    document.getElementById("output").value = result.trim();
    document.getElementById("lastUpdate").innerText = new Date().toLocaleString();
    document.getElementById("status").innerText = success ? "状态：同步成功 ✓" : "状态：同步失败 ✗";
}

// 首次加载和自动刷新
loadData();
setInterval(loadData, 30000);

// 复制内容
function copyContent() {
    const text = document.getElementById("output").value;
    navigator.clipboard.writeText(text);
    alert("复制成功");
}

// 搜索内容
function searchContent() {
    let keyword = document.getElementById("searchBox").value.toLowerCase();
    let content = document.getElementById("output").value;
    if (keyword === "") return;
    let lines = content.split("\n");
    let result = lines.filter(x => x.toLowerCase().includes(keyword));
    document.getElementById("output").value = result.join("\n");
}

// 深色模式
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

// 上传节点文件生成本地下载
document.getElementById("uploadBtn").onclick = function() {
    let content = document.getElementById("nodeContent").value.trim();
    if(!content){
        alert("请输入节点内容！");
        return;
    }
    let fileName = document.getElementById("userSelect").value;
    let blob = new Blob([content], {type:"text/plain"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    alert("节点文件已生成：" + fileName + "\n请手动上传到仓库 data 文件夹，然后刷新页面查看更新后的内容。");
};
</script>

</body>
</html>
