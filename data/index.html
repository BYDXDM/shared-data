<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>共享数据平台</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}
h1 {
    color: #333;
}
textarea {
    width: 100%;
    height: 300px;
    font-family: monospace;
    padding: 10px;
    box-sizing: border-box;
}
</style>
</head>
<body>

<h1>共享数据平台</h1>
<p>下面显示三份文本文件的合并内容：</p>

<textarea id="output" readonly></textarea>

<script>
async function loadData() {
    const files = [
        "data/a.txt",
        "data/b.txt",
        "data/c.txt"
    ];

    let result = "";

    for (let file of files) {
        try {
            const text = await fetch(file).then(r => r.text());
            if (text.trim() !== "") {
                result += text + "\n";
            }
        } catch(e) {
            console.error("读取文件失败:", file, e);
        }
    }

    document.getElementById("output").value = result.trim();
}

// 页面加载后执行
document.addEventListener("DOMContentLoaded", loadData);
</script>

</body>
</html>
